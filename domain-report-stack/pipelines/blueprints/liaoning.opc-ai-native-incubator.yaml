# 章节蓝图：liaoning.opc-ai-native-incubator
# 辽宁语境：政府合作 × 多种 OPC 业态 × AI 原生孵化与就业转化平台

schema_version: 1
team_id: liaoning.opc-ai-native-incubator
note: generate 默认映射 business-plan（同一 chapters）

engagements:
  business-plan:
    description: 平台商业策划（政府合作 + 可持续运营）
    chapters:
      - 执行摘要
      - 愿景与边界（OPC 定义、政府—平台—入驻主体责任界面）
      - 辽宁与区域机会（产业基础、人才供给、对标迁移假设）
      - 政府合作路径与政策工具组合
      - 平台治理与多种 OPC 业态 playbook
      - 人才实训、实习与用工合规体系
      - AI 工具链、数据与内容合规
      - 商业模式、阶段目标与资金节奏
      - 就业与产业带动测算方法（含局限性说明）
      - 风险矩阵与缓解措施
      - 结论与里程碑

  generate:
    description: 与 business-plan 同构（默认映射）
    chapters:
      - 执行摘要
      - 愿景与边界（OPC 定义、政府—平台—入驻主体责任界面）
      - 辽宁与区域机会（产业基础、人才供给、对标迁移假设）
      - 政府合作路径与政策工具组合
      - 平台治理与多种 OPC 业态 playbook
      - 人才实训、实习与用工合规体系
      - AI 工具链、数据与内容合规
      - 商业模式、阶段目标与资金节奏
      - 就业与产业带动测算方法（含局限性说明）
      - 风险矩阵与缓解措施
      - 结论与里程碑

  feasibility:
    description: 立项 / 可研向（政府决策与平台公司论证）
    chapters:
      - 概述与编制依据
      - 必要性与战略定位（就业、产业、数字化）
      - 市场与服务对象分析
      - 建设方案（平台架构、业态组合、实施路径）
      - 政府支持与合作机制设计
      - 组织与实施进度
      - 投资估算与资金筹措
      - 财务与敏感性分析
      - 社会效益与就业带动（方法与局限）
      - 风险、合规与结论建议

  due-diligence:
    description: 尽调备忘（政府合作、平台、劳动与合规）
    chapters:
      - 范围与假设
      - 政府协议与政策依据核验
      - 平台治理与入驻机制
      - 人才与劳动用工合规
      - AI、数据、知识产权与内容安全
      - 财务与关联交易关注点
      - 风险矩阵与建议条款

  policy-memo:
    description: 政策与合规备忘
    chapters:
      - 适用法规与政策层级梳理
      - 政府合作与采购边界
      - 劳动、实习与实训合规要点
      - 数据、算法与内容合规要点
      - 风险与应对
      - 结论与待办

  remediation:
    description: 已有报告研读与改造（见 docs/RUBRIC.md）
    chapters:
      - 文档类型与适用范围判定
      - 执行摘要（结论与风险各 3–5 条，指向完整缺陷表）
      - 完整缺陷表（P0–P3，条数不限；见 RUBRIC）
      - 多维评分与门槛说明
      - 修订计划（按优先级分批）
      - 修订稿结构说明或修订后正文
      - 变更说明（逐条对应缺陷 id）
